onboardingMoveKbm=Pressione A ou D para andar
onboardingMoveTouch=Arraste o joystick no lado esquerdo para andar
onboardingJumpKbm=Pressione Espaço para pular
onboardingJumpTouch=Toque no lado esquerdo da tela para pular
onboardingAim=Arraste no lado direito da tela para mirar
onboardingBreakKbm=Mire em um bloco e segure o botão esquerdo do mouse para quebrá-lo
onboardingBreakTouch=Mire em um bloco e segure o lado direito da tela para quebrá-lo
onboardingPlaceKbm=Clique com o botão direito para colocar o bloco da sua barra rápida\nSegure para colocá-lo na camada de fundo
onboardingPlaceTouch=Toque no lado direito da tela para colocar o bloco da sua barra rápida\nSegure para colocá-lo na camada de fundo
onboardingOpenInventory=Pressione E para abrir seu inventário e a fabricação
