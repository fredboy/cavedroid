onboardingMoveKbm=Press A or D to walk
onboardingMoveTouch=Drag the joystick on the left side to walk
onboardingJumpKbm=Press Space to jump
onboardingJumpTouch=Tap the left side of the screen to jump
onboardingAim=Drag on the right side of the screen to aim
onboardingBreakKbm=Aim at a block and hold left mouse button to break it
onboardingBreakTouch=Aim at a block and hold the right side of the screen to break it
onboardingPlaceKbm=Right-click to place the block from your hotbar
onboardingPlaceTouch=Tap the right side of the screen to place the block from your hotbar
onboardingOpenInventory=Press E to open your inventory and crafting
