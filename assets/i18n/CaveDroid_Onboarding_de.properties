onboardingMoveKbm=Drücke A oder D, um zu laufen
onboardingMoveTouch=Bewege den Joystick auf der linken Seite, um zu laufen
onboardingJumpKbm=Drücke die Leertaste, um zu springen
onboardingJumpTouch=Tippe auf die linke Seite des Bildschirms, um zu springen
onboardingAim=Wische über die rechte Seite des Bildschirms, um zu zielen
onboardingBreakKbm=Ziele auf einen Block und halte die linke Maustaste, um ihn abzubauen
onboardingBreakTouch=Ziele auf einen Block und halte die rechte Seite des Bildschirms, um ihn abzubauen
onboardingPlaceKbm=Rechtsklick, um den Block aus der Schnellleiste zu platzieren
onboardingPlaceTouch=Tippe auf die rechte Seite des Bildschirms, um den Block aus der Schnellleiste zu platzieren
onboardingOpenInventory=Drücke E, um dein Inventar und das Crafting zu öffnen
